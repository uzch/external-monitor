<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-labelledby="title desc">
  <title id="title">Connected Monitor v1 overview</title>
  <desc id="desc">A product overview showing public sources flowing into local monitor runs, evidence storage, optional evaluation, ranking, and account review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8f2"/>
      <stop offset="1" stop-color="#eef7f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f252a" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font:700 30px Arial, sans-serif;fill:#1f252a}
      .subtitle{font:400 16px Arial, sans-serif;fill:#4d575e}
      .box{fill:#ffffff;stroke:#d8d4cc;stroke-width:2;rx:18;filter:url(#shadow)}
      .box-title{font:700 18px Arial, sans-serif;fill:#1f252a}
      .box-copy{font:400 14px Arial, sans-serif;fill:#4d575e}
      .pill{fill:#8f1d1b}
      .pill-text{font:700 13px Arial, sans-serif;fill:#ffffff}
      .arrow{stroke:#8f1d1b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .guard{fill:#fff0c7;stroke:#d8c48a;stroke-width:2;rx:14}
      .guard-text{font:700 14px Arial, sans-serif;fill:#63480c}
    </style>
  </defs>
  <rect width="1100" height="500" fill="url(#bg)"/>
  <text x="54" y="58" class="title">External Account Signal Monitor</text>
  <text x="54" y="86" class="subtitle">Local-first evidence workflow for where to look, what changed, why it may matter, and what to validate next.</text>
  <g transform="translate(50 130)">
    <rect class="box" width="190" height="150"/>
    <rect x="20" y="22" class="pill" width="114" height="28" rx="14"/>
    <text x="34" y="41" class="pill-text">Public input</text>
    <text x="20" y="76" class="box-title">RSS/Atom sources</text>
    <text x="20" y="104" class="box-copy">Registered per account.</text>
    <text x="20" y="128" class="box-copy">Bounded by local policy.</text>
  </g>
  <path d="M255 205 H335" class="arrow"/>
  <path d="M323 193 L337 205 L323 217" class="arrow"/>
  <g transform="translate(350 130)">
    <rect class="box" width="190" height="150"/>
    <rect x="20" y="22" class="pill" width="104" height="28" rx="14"/>
    <text x="34" y="41" class="pill-text">Runtime</text>
    <text x="20" y="76" class="box-title">Monitor run</text>
    <text x="20" y="104" class="box-copy">Fetch, parse, match,</text>
    <text x="20" y="128" class="box-copy">dedupe, and persist.</text>
  </g>
  <path d="M555 205 H635" class="arrow"/>
  <path d="M623 193 L637 205 L623 217" class="arrow"/>
  <g transform="translate(650 130)">
    <rect class="box" width="190" height="150"/>
    <rect x="20" y="22" class="pill" width="96" height="28" rx="14"/>
    <text x="34" y="41" class="pill-text">Storage</text>
    <text x="20" y="76" class="box-title">Evidence records</text>
    <text x="20" y="104" class="box-copy">Fact, URL, dates,</text>
    <text x="20" y="128" class="box-copy">source, and excerpt.</text>
  </g>
  <path d="M855 205 H935" class="arrow"/>
  <path d="M923 193 L937 205 L923 217" class="arrow"/>
  <g transform="translate(950 130)">
    <rect class="box" width="100" height="150"/>
    <text x="20" y="62" class="box-title">Review</text>
    <text x="20" y="94" class="box-copy">Ranked</text>
    <text x="20" y="118" class="box-copy">accounts</text>
  </g>
  <g transform="translate(180 335)">
    <rect class="guard" width="740" height="92"/>
    <text x="26" y="36" class="guard-text">Guardrail: no evaluator means no Red Hat relevance, no semantic priority, and no validation action.</text>
    <text x="26" y="64" class="guard-text">Every visible signal keeps external fact, source evidence, hypothesis, uncertainty, and action separate.</text>
  </g>
</svg>
