services:
  intelligence-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: connected_monitor
      POSTGRES_USER: connected_monitor
      POSTGRES_PASSWORD: connected_monitor
    ports:
      - "5432:5432"
    volumes:
      - intelligence-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connected_monitor -d connected_monitor"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-postgres:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      temporal-postgres:
        condition: service_started
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: temporal-postgres
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
    ports:
      - "7233:7233"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: connected-monitor
      MINIO_ROOT_PASSWORD: connected-monitor-local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - intelligence-artifacts:/data

  intelligence-api:
    build: intelligence
    command: sh -c "uv run --no-dev alembic upgrade head && uv run --no-dev uvicorn connected_monitor_intelligence.api:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      CM_INTELLIGENCE_DATABASE_URL: postgresql+psycopg://connected_monitor:connected_monitor@intelligence-postgres:5432/connected_monitor
      CM_TEMPORAL_ADDRESS: temporal:7233
      CM_ARTIFACT_ENDPOINT: http://minio:9000
    depends_on:
      intelligence-postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"

  intelligence-worker:
    build: intelligence
    command: uv run --no-dev python -m connected_monitor_intelligence.worker
    env_file: .env
    environment:
      CM_INTELLIGENCE_DATABASE_URL: postgresql+psycopg://connected_monitor:connected_monitor@intelligence-postgres:5432/connected_monitor
      CM_TEMPORAL_ADDRESS: temporal:7233
      CM_ARTIFACT_ENDPOINT: http://minio:9000
    depends_on:
      intelligence-api:
        condition: service_started

volumes:
  intelligence-postgres:
  temporal-postgres:
  intelligence-artifacts:
